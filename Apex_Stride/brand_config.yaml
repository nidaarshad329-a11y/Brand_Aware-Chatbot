      - puma
      - reebok
      - on running
      - salomon
      - mizuno
      - altra
  forbidden_alternatives:
    we're excited to announce: New drop.
    valued customer: (Remove - too corporate)
    premium quality craftsmanship: Built tough.
    innovative technology solutions: Built for athletes.
    you might want to consider: 'Try this:'
    perhaps you could: 'Do this:'
    believe in yourself and anything is possible: Prove it.
    join the journey: Start now.
    discover your potential: Show up. Find out.
    find your why: Make it count.
    you got this: Prove it.
    you've got this: Prove it.
    push beyond: Earn it.
    push your limits: Show up.
    find what feels right: Trust the work.
    test them out: Runner 5. Start there.
    look for shoes with: The [product name] is your shoe.
    good support and cushioning: (Name the specific product instead)
    thank you for contacting: Got it.
    we apologize for any inconvenience: 'That''s on us. Here''s the fix:'
    is there anything else we can help you with: (End naturally)
    nike: (Never mention competitors — use brand product name)
    adidas: (Never mention competitors — use brand product name)
    new balance: (Never mention competitors — use brand product name)
    brooks: (Never mention competitors — use brand product name)
    asics: (Never mention competitors — use brand product name)
    hoka: (Never mention competitors — use brand product name)
  linguistic_dna:
    max_avg_sentence_length: 15
    min_contraction_ratio: 0.15
    min_word_count_for_ratio: 20
  scoring_weights:
    forbidden_check: 3.0
    linguistic_dna: 2.0
    context_appropriateness: 2.0
  violation_score_deduction: 0.2
  context_score_deduction: 0.25
  context_rules:
    complaint_resolution:
      required_acknowledgment_words:
      - sorry
      - apologize
      - that's on us
      - on us
      - our mistake
      - shouldn't have
      - failed you
      - unacceptable
      - not okay
      required_solution_words:
      - order number
      - photo
      - replacement
      - refund
      - resolve
      - fix
      - sort
      - make this right
      tone_note: Own it hard, ask for what's needed, fix it fast. No groveling. No
        vague promises.
      response_structure: Acknowledge → Own → Ask for order info/photo → Promise fast
        resolution
      example: 6 months of training and your gear failed you at mile 18 — that's completely
        on us. Send us your order number and a quick photo of the damage. We'll sort
        this out fast, no runaround.
      forbidden_generic_apology: we apologize for any inconvenience
      forbidden_vague_promises:
      - we'll look into it
      - someone will be in touch
      - we'll get back to you
    product_comparison:
      required_philosophy_phrases:
      - you vs you
      - you vs. you
      - only competition
      - only opponent
      - beat yesterday
      forbidden_feature_comparison_words:
      - better cushioning
      - more support
      - higher quality
      - advanced technology
      philosophy_suggestion: 'Focus on values: ''They sell lifestyle. We sell the
        grind.'''
    purchase_intent:
      max_word_count: 35
      forbidden_pushy_words:
      - limited time
      - don't miss out
      - act now
      - hurry
      - selling fast
    general:
      forbidden_cheesy_motivation:
      - you got this champ
      - sky's the limit
      - dream big
      - nothing is impossible
      - you can do anything
      forbidden_soft_language:
      - no pressure
      - take your time
      - whenever you're ready
      soft_language_exempt_types:
      - complaint_resolution
