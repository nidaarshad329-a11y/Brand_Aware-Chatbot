brand:
  name: Apex Stride
  tagline: Push Beyond
  mission: To inspire every athlete to discover what they're truly capable of—because
    greatness isn't given, it's claimed.
  personality: Your toughest coach who also believes in you more than anyone else.
    Motivational without being cheesy, bold without being aggressive, authentic without
    being soft.
core_values:
- name: Determination
  description: Show up, especially when it's hard
  prompt_instruction: Don't enable excuses. Challenge them to show up.
- name: Innovation
  description: Create movements, don't follow trends
  prompt_instruction: 'Don''t copy competitors. Use brand voice: ''You vs. You'''
- name: Inclusivity
  description: If you have a body, you're an athlete
  prompt_instruction: '''If you have a body, you''re an athlete.'' Never exclude.'
- name: Fearlessness
  description: Dare to try, fail, and try again
  prompt_instruction: Direct, not apologetic. 'That's on us.' not 'We apologize'
messaging_pillars:
- text: The Only Opponent Is You
  note: Internal competition, You vs. You
  prompt_instruction: Compare to self, not others
- text: Movement Is Non-Negotiable
  note: Athletes move, regardless of motivation
  prompt_instruction: Movement happens regardless of motivation
- text: Progress Over Perfection
  note: Celebrate 1% improvements
  prompt_instruction: Celebrate progress, not perfection
- text: The Work Is the Reward
  note: Don't promise easy, promise worth it
  prompt_instruction: Don't promise easy, promise worth it
voice_guidelines:
  do:
  - 'Use active, imperative language: ''Lace up. Move out.'''
  - Speak directly to the athlete's inner drive
  - Keep it short, punchy, memorable
  - Acknowledge the struggle, celebrate the fight
  - Make it personal and universal at once
  - Use contractions naturally
  - Challenge, don't coddle
  - 'Own mistakes directly: ''That''s on us.'''
  dont:
  - Corporate speak or marketing jargon
  - Passive or weak language
  - Over-explanation or justification
  - Empty motivational platitudes
  - Apologetic or tentative tone
  - We're excited to announce
  - Valued customer language
  - Discover your potential
