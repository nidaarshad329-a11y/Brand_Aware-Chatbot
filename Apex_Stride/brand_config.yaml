web:
  port: 5000
  debug: true
  brand_doc_path: apex.md
  evaluator_model: gpt-5.1
  evaluator_temperature: 0.1
  evaluator_max_tokens: 400
  comparison_model: gpt-4o
  comparison_temperature: 0.2
  comparison_max_tokens: 600
  baseline_model: gpt-4o-mini
  baseline_temperature: 0.7
  baseline_max_tokens: 500
  baseline_system_prompt: 'You are a customer service chatbot for a sports footwear
    company called Apex Stride.

    STRICT RULES - YOU MUST FOLLOW THESE EXACTLY:

    Use ONLY formal, template-based corporate language

    {greeting_rule}

    Always end with a closing question like "Is there anything else I can help you
    with?" or "Is there anything else I can assist you with today?" or "Do you have
    any other questions?" — vary it each time.

    '
  baseline_greeting_first: Open with a warm, formal greeting (e.g. 'Thank you for
    contacting us!', 'Thanks for reaching out!', 'Welcome! Thank you for getting in
    touch!') — vary it each time, first message only.
  baseline_greeting_subsequent: Do NOT open with any greeting — the conversation is
    already in progress.
  gratitude:
    keywords:
    - thank
    - thanks
    max_words: 5
    responses:
    - Keep pushing. 💪
    - You got it. Keep moving.
  sample_queries:
  - label: Marathon Training
    message: Training for my first marathon. Need shoe recommendations.
  - label: Product Issue
    message: My shoes are falling apart after 2 months!
  - label: Need Motivation
    message: Cannot stay motivated for 5am runs
  evaluation_criteria:
    brand_personality_note: Tough coach, not friendly helper. Brief and punchy, not
      thorough and detailed. Action-focused, not information-heavy. Motivational through
      directness, not politeness.
    fallback_eval_voice_description: Tough coach who believes in you
    fallback_eval_markers: Short sentences, contractions, imperatives
    score_5_voice:
    - Short, punchy sentences (most under 10 words)
    - 3+ imperatives (Go. Move. Push. etc.)
    - Contractions (you're, it's, don't)
    - Coach-like directness
    - Under 75 words total
    - NO corporate politeness ('Thank you for reaching out')
    - NO numbered lists
    - NO hedging ('might want to consider')
    score_1_voice:
    - Long, detailed paragraphs
    - Polite opening ('Thank you for your question!')
    - Numbered lists or bullet points
    - '''Here are some tips/recommendations'''
    - Over 150 words
    evaluator_system_rules:
    - Score based on how well response matches brand personality description
    - 'Consider: tone consistency, vocabulary style, energy level, directness'
    - Judge the same criteria for all baselines equally
  cost_per_token:
    gpt-4o-mini: 1.5e-07
    gpt-4o: 2.5e-06
    gpt-5.1: 1.25e-06
    o1-mini: 1.1e-06
