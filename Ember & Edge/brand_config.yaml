# ── SPECIAL RESPONSE RULES ────────────────────────────────────────────────────
special_rules:
  refund:
    intent: "return_refund"
    trigger_keywords: ["money back", "refund", "return"]
    response_template: "A blade that disappoints has no place in your kitchen. Bring your purchase receipt to any nearby store - if it's within warranty, your refund is processed on the spot. The blade should serve you, not disappoint you."

  replacement:
    intent: "replacement"
    default_product_keyword: "chef"
    default_product_name: "Artisan Chef's Knife"
    default_product_fallback: "knife"
    response_template: "A blade should whisper, not struggle. Bring your purchase receipt to any nearby store — if it's within warranty, a new {product} is yours on the spot if available. If not, a tracking number is assigned and it reaches you within 2-3 days. You should feel the edge, not fight it."

# ── LLM / API SETTINGS ───────────────────────────────────────────────────────
llm:
  generation_model: "gpt-4o"
  generation_temperature: 0.7
  generation_max_tokens: 80
  generation_max_words_instruction: 60   

  regeneration_model: "gpt-4o"
  regeneration_temperature: 0.6
