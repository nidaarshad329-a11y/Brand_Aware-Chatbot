web:
  port: 5001
  debug: true
  brand_doc_path: null

  evaluator_model: "gpt-4o"
  evaluator_temperature: 0.1
  evaluator_max_tokens: 400
  comparison_model: "gpt-4o"
  comparison_temperature: 0.2
  comparison_max_tokens: 600

  baseline_model: "gpt-4o-mini"
  baseline_temperature: 0.7
  baseline_max_tokens: 600
  baseline_system_prompt: |
    You are a customer service assistant for a knife company called Ember & Edge.
    STRICT RULES - YOU MUST FOLLOW THESE EXACTLY:
    Use ONLY formal, template-based corporate language
    {greeting_rule}
    Always end with a closing question like "Is there anything else I can help you with?" or "Is there anything else I can assist you with today?" or "Do you have any other questions?" — vary it each time.

  baseline_greeting_first: "Open with a warm, formal greeting (e.g. 'Thank you for contacting us!', 'Thanks for reaching out!', 'Welcome! Thank you for getting in touch!') — vary it each time, first message only."
  baseline_greeting_subsequent: "Do NOT open with any greeting — the conversation is already in progress."


  gratitude:
    keywords: ["thank", "thanks"]
    max_words: 5
    responses:
      - "Back to the cutting board."
      - "Quiet hands. Sharp edge."

  sample_queries:
    - label: "First Knife"
      message: "I'm looking for my first good knife. Where do I start?"
    - label: "Knife Went Dull"
      message: "My chef's knife went dull after two weeks. I'm disappointed."
    - label: "Safety Concern"
      message: "I'm a bit scared of sharp knives. Any advice?"

  evaluation_criteria:
    brand_personality_note: "Patient chef-instructor, not corporate customer service. Sensory and poetic, not spec-driven. Calm and decisive, not pushy or generic."
    fallback_eval_voice_description: "Patient Michelin-trained chef-instructor"
    fallback_eval_markers: "Sensory language, flowing sentences, no corporate phrases, decisive recommendations"

    score_5_voice:
      - "Natural flowing sentences (8-15 words)"
      - "Sensory language: feel, weight, glide, whisper, balance"
      - "Decisive — names the knife"
      - "No corporate phrases ('Does that help?', 'Feel free to')"
      - "No technical specs (HRC, angles)"
      - "Under 100 words total"
      - "Ends with one gentle question OR a poetic sign-off"
    score_1_voice:
      - "Corporate opener ('Thank you for reaching out!')"
      - "Technical specs (HRC, Rockwell, blade angle)"
      - "Generic phrases ('Does that make sense?', 'Let me know if')"
      - "Numbered lists"
      - "Over 200 words"
      - "Poetry used during complaint handling"

    evaluator_system_rules:
      - "Technical specs = automatic Brand_Voice score of 1"
      - "'Thank you for reaching out' = automatic Brand_Voice score of 1"
      - "Poetry/metaphors in a complaint response = automatic Brand_Voice score of 1"
      - "Sensory language in appropriate context = score boost"
      - "Under 80 words with decisive recommendation = score boost"

  cost_per_token:
    gpt-4o-mini: 0.00000015
    gpt-4o: 0.0000025
    gpt-5.1: 0.00001
